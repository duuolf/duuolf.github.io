<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebUSB Example</title>
</head>
<body>
    <h1>WebUSB Example</h1>
    <button id="connectButton">Connect to USB Device</button>
    <div id="status"></div>

    <script>
        document.getElementById('connectButton').addEventListener('click', async () => {
            const statusDiv = document.getElementById('status');
            try {
                // 请求用户选择一个符合过滤器条件的 USB 设备
                const device = await navigator.usb.requestDevice({ filters: [] });
                // 打开 USB 设备
                await device.open();
                // 成功连接并打开设备
                statusDiv.textContent = 'Device opened successfully: ' + device.productName;
                console.log('Device opened successfully:', device);
            } catch (error) {
                // 处理错误
                statusDiv.textContent = 'Error accessing USB device: ' + error.message;
                console.error('Error accessing USB device:', error);
            }
        });
    </script>
</body>
</html>
