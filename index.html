<!DOCTYPE html>
<html>
<head>
    <title>WebUSB Example</title>
</head>
<body>
    <button id="connect">Connect to ARC122U</button>
    <p id="status"></p>

    <script>
        document.getElementById('connect').addEventListener('click', async () => {
            try {
                // 请求用户选择并连接 ARC122U 设备
                const device = await navigator.usb.requestDevice({
                    filters: [{ vendorId: 1839, productId: 8704 }] // 根据 ARC122U 的具体 vendorId 和 productId 进行设置
                });

                console.log('Device selected:', device);

                // 连接到设备
                await device.open();
                console.log('Device opened');

                await device.selectConfiguration(1);
                console.log('Configuration selected');

                await device.claimInterface(0);
                console.log('Interface claimed');

                document.getElementById('status').textContent = 'Device connected';

                // 向设备发送和接收数据的逻辑可以放在这里
                // 例如，发送一个简单的命令
                const command = new Uint8Array([0xFF, 0xCA, 0x00, 0x00, 0x04]);
                const result = await device.transferOut(1, command);
                console.log('Data sent:', result);

                const response = await device.transferIn(1, 64);
                console.log('Data received:', response);

                const decoder = new TextDecoder();
                const responseData = decoder.decode(response.data);
                console.log('Decoded response:', responseData);
                document.getElementById('status').textContent = 'Received: ' + responseData;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').textContent = 'Error: ' + error;
            }
        });
    </script>
</body>
</html>
